<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga Milan United FC</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#0f5132,#198754);
min-height:100vh;
color:white;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
font-size:40px;
}

h2{
margin:20px 0;
}

.container{
max-width:1400px;
margin:auto;
}

.card{
background:rgba(255,255,255,.1);
backdrop-filter:blur(10px);
border-radius:15px;
padding:20px;
margin-bottom:20px;
box-shadow:0 0 15px rgba(0,0,0,.3);
}

button{
background:#ffc107;
border:none;
padding:10px 15px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin:5px;
}

button:hover{
opacity:.9;
}

input{
padding:5px;
border:none;
border-radius:5px;
width:60px;
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#212529;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid rgba(255,255,255,.2);
text-align:center;
}

.login-box{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
}

.status{
font-weight:bold;
color:#ffc107;
}

.champion{
font-size:22px;
font-weight:bold;
color:gold;
}

.readonly{
opacity:.7;
pointer-events:none;
}

footer{
text-align:center;
margin-top:20px;
}

.rank1{
background:rgba(255,215,0,.25);
}

.rank2{
background:rgba(192,192,192,.25);
}

.rank3{
background:rgba(205,127,50,.25);
}

.header{
text-align:center;
margin-bottom:20px;
}

.escudo{
width:180px;
height:auto;
margin-bottom:10px;
filter:drop-shadow(0 0 20px red);
animation: brilloEscudo 2s infinite alternate;
}

@keyframes brilloEscudo{
from{
transform:scale(1);
filter:drop-shadow(0 0 10px red);
}
to{
transform:scale(1.05);
filter:drop-shadow(0 0 30px red);
}
}
  /* RESPONSIVE PARA CELULAR */

@media (max-width: 768px){

.container{
padding:5px;
}

h1{
font-size:28px;
}

.card{
overflow-x:auto;
padding:10px;
}

table{
font-size:12px;
min-width:700px;
}

input{
width:45px;
padding:3px;
}

.login-box{
flex-direction:column;
align-items:stretch;
}

button{
width:100%;
}
  
/* EQUIPO A */

.oro{
background:gold !important;
color:black;
font-weight:bold;
animation: campeon 1.5s infinite alternate;
}

.plata{
background:silver !important;
color:black;
font-weight:bold;
}

.descenso{
background:#ff8a8a !important;
font-weight:bold;
animation: descenso 1s infinite alternate;
}

.descenso2{
background:#dc3545 !important;
font-weight:bold;
animation: descenso 1s infinite alternate;
}

/* EQUIPO B */

.ascenso{
background:#90EE90 !important;
color:black;
font-weight:bold;
animation: ascenso 1s infinite alternate;
}

.ascenso2{
background:#7CFC00 !important;
color:black;
font-weight:bold;
animation: ascenso 1s infinite alternate;
}

/* ANIMACIÓN CAMPEÓN */

@keyframes campeon{
from{
box-shadow:0 0 10px gold;
}
to{
box-shadow:0 0 30px gold;
transform:scale(1.02);
}
}

/* ANIMACIÓN DESCENSO */

@keyframes descenso{
from{
background:#ff8a8a;
}
to{
background:#dc3545;
color:white;
}
}

/* ANIMACIÓN ASCENSO */

@keyframes ascenso{
from{
background:#90EE90;
}
to{
background:#00ff66;
box-shadow:0 0 20px #00ff66;
}
}

/* TABLA GENERAL */

.bronce{
background:#cd7f32 !important;
font-weight:bold;
}

  .escudo{
width:120px;
}
  
}
</style>
</head>

<body>

<div class="container">
<div class="header">
  <img src="escudo.png" alt="Escudo Milan United" class="escudo">
  <h1>Liga Milan United FC</h1>
</div>

<div class="card">
  <h2>Login Administrador</h2>

  <div class="login-box">
    <input type="text" id="user" placeholder="Usuario">
    <input type="password" id="pass" placeholder="Contraseña">

    <button onclick="login()">Ingresar</button>
    <button onclick="logout()">Salir</button>
  </div>

 <div id="adminPanel" style="display:none;">
  <button onclick="guardarDatos()">💾 Guardar</button>
  <button onclick="agregarJugador()">➕ Crear Jugador</button>
  <button onclick="eliminarJugador()">❌ Eliminar Jugador</button>
   <button onclick="reiniciarMes()">🏆 Terminar Mes</button>
   <button onclick="eliminarCampeones()">🗑️ Borrar Campeones</button>
</div>

  <span class="status" id="loginStatus">Modo visitante</span>
</div>

<div class="card">
<h2>Acciones</h2>

<div id="ultimoCampeon" class="champion"></div>
<div id="mvpMes" class="champion"></div>
</div>
  
  <div class="card">
  <h2>Equipo A</h2>
  <table id="tablaA">
    <thead>
      <tr>
        <th>#</th>
        <th>Jugador</th>
        <th>Goles</th>
        <th>Asist.</th>
        <th>Def.</th>
        <th>Ataj.</th>
        <th>Part.</th>
        <th>Puntos</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div class="card">
  <h2>Equipo B</h2>
  <table id="tablaB">
    <thead>
      <tr>
        <th>#</th>
        <th>Jugador</th>
        <th>Goles</th>
        <th>Asist.</th>
        <th>Def.</th>
        <th>Ataj.</th>
        <th>Part.</th>
        <th>Puntos</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div class="card">
  <h2>🏅 Tabla General</h2>
  <table id="tablaGeneral">
    <thead>
      <tr>
        <th>#</th>
        <th>Jugador</th>
        <th>Equipo</th>
        <th>Puntos</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div class="card">
  <h2>📜 Historial de Campeones</h2>
  <ul id="historial"></ul>
</div>

<footer>
Liga Milan United FC © 2026
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
  
const firebaseConfig = {
  apiKey: "AIzaSyBin3BZQABrtgCgIi7PAnumHs473JVXagc",
  authDomain: "liga-milan-united.firebaseapp.com",
  projectId: "liga-milan-united",
  storageBucket: "liga-milan-united.firebasestorage.app",
  messagingSenderId: "395474896963",
  appId: "1:395474896963:web:a7ff5386d47db873e7ecf6",
  measurementId: "G-7N2TTWV7VC"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 GUARDAR CAMPEÓN
window.guardarCampeon = async function(nombre, puntos) {
  await addDoc(collection(db, "campeones"), {
    nombre,
    puntos,
    fecha: new Date().toLocaleDateString()
  });

  cargarHistorial();
};

// 🔥 CARGAR HISTORIAL
window.cargarHistorial = async function() {
  const ul = document.getElementById("historial");
  ul.innerHTML = "";

  const snapshot = await getDocs(collection(db, "campeones"));

  let data = [];

  snapshot.forEach(doc => {
    data.push(doc.data());
  });

  if(data.length === 0){
    ul.innerHTML = "<li>No hay campeones aún</li>";
    return;
  }

  data.forEach(item => {
    const li = document.createElement("li");
    li.textContent = `${item.fecha} - ${item.nombre} (${item.puntos} pts)`;
    ul.appendChild(li);
  });

  const ultimo = data[data.length - 1];

  document.getElementById("ultimoCampeon").textContent =
  `🏆 Último campeón: ${ultimo.nombre}`;
};
  
  window.eliminarCampeones = async function(){

  if(!confirm("¿Eliminar todo el historial de campeones?")){
    return;
  }

  const snapshot = await getDocs(
    collection(db, "campeones")
  );

  const promesas = [];

  snapshot.forEach(item => {
    promesas.push(
      deleteDoc(
        doc(db, "campeones", item.id)
      )
    );
  });

  await Promise.all(promesas);

  document.getElementById("historial").innerHTML =
  "<li>No hay campeones aún</li>";

  document.getElementById("ultimoCampeon").textContent = "";

  alert("Historial eliminado correctamente.");
};


</script>

<script>

const EQUIPO_A = [
"Candia",
"Kristian",
"Juan Manuel",
"Cardona",
"Henao",
"Juan Diego",
"Esteban",
"Antony",
"Van Dijk",
"Cruz",
"David",
"Santiago"
];

const EQUIPO_B = [
"Juan Diego Hernández",
"Dilan",
"Jorge",
"Juan Diego Negro",
"Nicolas Martínez",
"Alex",
"Nicolas",
"Yampier",
"Sebas Pino",
"Samuel",
"Kakà"
];

const USER = "sharonf1";
const PASS = "17091097";

let admin = false;

let jugadores = {};

function crearJugador(nombre,equipo){
return{
nombre,
equipo,
goles:0,
asistencias:0,
defensas:0,
atajadas:0,
participaciones:0,
puntos:0
};
}

function iniciarDatos(){

const guardado = localStorage.getItem("ligaDatos");

if(guardado){
  jugadores = JSON.parse(guardado);
} else {
  jugadores = {};

  EQUIPO_A.forEach(j=>{
    jugadores[j] = crearJugador(j,"A");
  });

  EQUIPO_B.forEach(j=>{
    jugadores[j] = crearJugador(j,"B");
  });

  guardarDatos();
}

renderizar(); // 🔥 OBLIGATORIO
}
  function calcularPuntos(j){

return (
(j.goles * 4) +
(j.asistencias * 3) +
(j.defensas * 2) +
(j.atajadas * 2) +
(j.participaciones * 1)
);

}

function guardarDatos(){

localStorage.setItem(
"ligaDatos",
JSON.stringify(jugadores)
);

actualizarTablaGeneral();
}

function login(){

const u =
document.getElementById("user").value;

const p =
document.getElementById("pass").value;

if(u===USER && p===PASS){

admin = true;
document.getElementById(
"adminPanel"
).style.display = "block";

document.getElementById(
"loginStatus"
).textContent = "Administrador conectado";

renderizar();

}else{

alert("Credenciales incorrectas");

}

}

function logout(){

admin = false;
document.getElementById(
"adminPanel"
).style.display = "none";

document.getElementById(
"loginStatus"
).textContent = "Modo visitante";

renderizar();

}

function crearFila(jugador,posicion){

const tr =
document.createElement("tr");

const disabled =
admin ? "" : "disabled";

tr.innerHTML = `
<td>${posicion}</td>
<td>${jugador.nombre}</td>

<td>
<input
type="number"
min="0"
value="${jugador.goles}"
${disabled}
oninput="actualizarStat('${jugador.nombre}','goles',this.value)"
>
</td>

<td>
<input
type="number"
min="0"
value="${jugador.asistencias}"
${disabled}
oninput="actualizarStat('${jugador.nombre}','asistencias',this.value)"
>
</td>

<td>
<input
type="number"
min="0"
value="${jugador.defensas}"
${disabled}
oninput="actualizarStat('${jugador.nombre}','defensas',this.value)"
>
</td>

<td>
<input
type="number"
min="0"
value="${jugador.atajadas}"
${disabled}
oninput="actualizarStat('${jugador.nombre}','atajadas',this.value)"
>
</td>

<td>
<input
type="number"
min="0"
value="${jugador.participaciones}"
${disabled}
oninput="actualizarStat('${jugador.nombre}','participaciones',this.value)"
>
</td>

<td>${jugador.puntos}</td>
`;

return tr;
}

function actualizarStat(
nombre,
campo,
valor
){

jugadores[nombre][campo] =
parseInt(valor) || 0;

jugadores[nombre].puntos =
calcularPuntos(jugadores[nombre]);

guardarDatos();

renderizar();
}
 function renderizar(){

const bodyA =
document.querySelector("#tablaA tbody");

const bodyB =
document.querySelector("#tablaB tbody");

bodyA.innerHTML = "";
bodyB.innerHTML = "";

/* EQUIPO A ORDENADO */

let rankingA =
Object.values(jugadores)
.filter(j=>j.equipo==="A")
.sort((a,b)=>b.puntos-a.puntos);

rankingA.forEach((jugador,index)=>{

let fila =
crearFila(jugador,index+1);

if(index===0)
fila.classList.add("oro");

if(index===1)
fila.classList.add("plata");

if(index===10)
fila.classList.add("descenso");

if(index===11)
fila.classList.add("descenso2");

bodyA.appendChild(fila);

});

/* EQUIPO B ORDENADO */

let rankingB =
Object.values(jugadores)
.filter(j=>j.equipo==="B")
.sort((a,b)=>b.puntos-a.puntos);

rankingB.forEach((jugador,index)=>{

let fila =
crearFila(jugador,index+1);

if(index===0)
fila.classList.add("ascenso");

if(index===1)
fila.classList.add("ascenso2");

bodyB.appendChild(fila);

});

actualizarTablaGeneral();
actualizarMVP();

}

function actualizarTablaGeneral(){

const tbody =
document.querySelector(
"#tablaGeneral tbody"
);

tbody.innerHTML = "";

let lista =
Object.values(jugadores)
.sort((a,b)=>b.puntos-a.puntos);

lista.forEach((j,index)=>{

let clase = "";

if(index===0) clase="oro";
if(index===1) clase="plata";
if(index===2) clase="bronce";

tbody.innerHTML += `
<tr class="${clase}">
<td>${index+1}</td>
<td>${j.nombre}</td>
<td>${j.equipo}</td>
<td>${j.puntos}</td>
</tr>
`;

});

}

function actualizarMVP(){

let ranking =
Object.values(jugadores)
.sort((a,b)=>b.puntos-a.puntos);

if(ranking.length){

document.getElementById(
"mvpMes"
).innerHTML =
`⭐ MVP Actual: ${ranking[0].nombre} (${ranking[0].puntos} pts)`;

}

}

async function reiniciarMes(){

if(!admin){
alert("Solo el administrador puede reiniciar.");
return;
}

const ranking =
Object.values(jugadores)
.sort((a,b)=>b.puntos-a.puntos);

if(ranking.length){

await guardarCampeon(
ranking[0].nombre,
ranking[0].puntos
);
  
}

let equipoA =
Object.values(jugadores)
.filter(j=>j.equipo==="A")
.sort((a,b)=>b.puntos-a.puntos);

let equipoB =
Object.values(jugadores)
.filter(j=>j.equipo==="B")
.sort((a,b)=>b.puntos-a.puntos);


let descenso1 =
equipoA[equipoA.length - 1];

let descenso2 =
equipoA[equipoA.length - 2];


let ascenso1 =
equipoB[0];

let ascenso2 =
equipoB[1];

if(descenso1 && ascenso1){

descenso1.equipo = "B";
ascenso1.equipo = "A";

}

if(descenso2 && ascenso2){

descenso2.equipo = "B";
ascenso2.equipo = "A";

}
  
Object.keys(jugadores).forEach(nombre=>{

jugadores[nombre].goles = 0;
jugadores[nombre].asistencias = 0;
jugadores[nombre].defensas = 0;
jugadores[nombre].atajadas = 0;
jugadores[nombre].participaciones = 0;
jugadores[nombre].puntos = 0;

});

guardarDatos();
renderizar();

alert("Mes reiniciado correctamente.");

}
  function agregarJugador(){

  const nombre = prompt("Nombre del jugador:");

  if(!nombre) return;

  const equipo = prompt("Equipo (A o B):");

  if(equipo !== "A" && equipo !== "B"){
    alert("Equipo inválido");
    return;
  }

  jugadores[nombre] = crearJugador(nombre, equipo);

  guardarDatos();
  renderizar();
}

function eliminarJugador(){

  const nombre = prompt("Nombre exacto del jugador:");

  if(!jugadores[nombre]){
    alert("Jugador no encontrado");
    return;
  }

  delete jugadores[nombre];

  guardarDatos();
  renderizar();
}

window.onload = () => {

  iniciarDatos();

  Object.values(jugadores).forEach(j => {
    j.puntos = calcularPuntos(j);
  });

  guardarDatos();

  renderizar();

  if (window.cargarHistorial) {
    window.cargarHistorial();
  }

};
  
</script>
</div>

</body>
